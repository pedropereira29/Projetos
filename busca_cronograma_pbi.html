<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Busca de Atividades – Dashboard 4D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap');

  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #21262d;
    --accent:   #00b894;
    --accent2:  #0984e3;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --danger:   #f85149;
    --warning:  #e3b341;
    --success:  #3fb950;
    --neutral:  #484f58;
    --row-odd:  rgba(255,255,255,0.018);
    --row-hover:#1c2128;
    --selected: rgba(0,184,148,0.08);
    --sel-border:#00b894;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .accent-bar { width: 3px; height: 24px; background: linear-gradient(180deg, var(--accent), var(--accent2)); border-radius: 2px; }
  .title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .subtitle { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .badge-total {
    background: rgba(0,184,148,0.15);
    border: 1px solid rgba(0,184,148,0.3);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  /* ── SEARCH ROW ── */
  .controls {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); pointer-events: none; }
  .search-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 32px 8px 36px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    caret-color: var(--accent);
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,184,148,0.12);
  }
  .search-input::placeholder { color: var(--neutral); }
  .clear-btn {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 16px; line-height: 1; padding: 2px;
    display: none;
  }
  .search-input:not(:placeholder-shown) ~ .clear-btn { display: block; }

  .filter-select {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
    cursor: pointer;
    transition: border-color .2s;
  }
  .filter-select:focus { border-color: var(--accent); }
  .filter-select option { background: #1c2128; }

  .result-count {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    padding: 0 4px;
  }

  /* ── TABLE ── */
  .table-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .table-head {
    display: grid;
    grid-template-columns: 90px 1fr 115px 105px 105px 120px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    flex-shrink: 0;
    user-select: none;
    gap: 8px;
  }
  .th-sort { cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .th-sort:hover { color: var(--text); }

  /* Virtual scroll container */
  .virtual-outer {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .virtual-outer::-webkit-scrollbar { width: 6px; }
  .virtual-outer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .virtual-inner { position: relative; }

  .row {
    display: grid;
    grid-template-columns: 90px 1fr 115px 105px 105px 120px;
    padding: 0 16px;
    gap: 8px;
    align-items: center;
    height: 38px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    border-left: 3px solid transparent;
    transition: background .12s, border-color .12s;
    position: absolute;
    left: 0; right: 0;
  }
  .row:nth-child(odd) { background: var(--row-odd); }
  .row:hover { background: var(--row-hover); }
  .row.selected { background: var(--selected) !important; border-left-color: var(--sel-border); }

  .cell-edt {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cell-name {
    font-size: 12.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cell-name.lvl-1 { font-weight: 700; color: var(--text); }
  .cell-name.lvl-2 { font-weight: 500; color: #cdd9e5; padding-left: 10px; }
  .cell-name.lvl-3 { font-weight: 400; color: #adb5bd; padding-left: 20px; }
  .cell-name.lvl-4 { font-weight: 400; color: #8b949e; padding-left: 30px; }
  .cell-name mark { background: rgba(0,184,148,0.35); color: var(--text); border-radius: 2px; padding: 0 1px; }

  .cell-date { font-size: 11.5px; color: var(--muted); text-align: center; white-space: nowrap; }

  /* Status badge */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 20px;
    font-size: 10.5px; font-weight: 600; white-space: nowrap;
  }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .badge-concluido   { background: rgba(63,185,80,.15);   color: #3fb950; }
  .badge-andamento   { background: rgba(9,132,227,.15);   color: #58a6ff; }
  .badge-atrasado    { background: rgba(248,81,73,.15);   color: #f85149; }
  .badge-executado   { background: rgba(72,79,88,.2);     color: #8b949e; }

  /* Progress cell */
  .cell-progress { display: flex; align-items: center; gap: 7px; }
  .progress-track { flex: 1; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .4s; }
  .pct-label { font-size: 11px; color: var(--text); min-width: 30px; text-align: right; }

  /* ── DETAIL PANEL ── */
  .detail {
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height .25s ease;
  }
  .detail.open { max-height: 180px; }
  .detail-inner { padding: 12px 16px; }
  .detail-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 10px;
  }
  .detail-edt { font-size: 10px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
  .detail-name { font-size: 14px; font-weight: 700; color: var(--text); margin-top: 2px; }
  .close-btn {
    background: rgba(255,255,255,.06); border: 1px solid var(--border);
    color: var(--muted); border-radius: 6px; padding: 3px 9px;
    cursor: pointer; font-size: 12px; flex-shrink: 0; margin-left: 12px;
  }
  .close-btn:hover { color: var(--text); }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
  .detail-kv {
    background: rgba(255,255,255,.03); border: 1px solid var(--border);
    border-radius: 7px; padding: 8px 10px;
  }
  .detail-kv .k { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  .detail-kv .v { font-size: 13px; font-weight: 600; color: var(--text); }

  /* ── EMPTY STATE ── */
  .empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 200px; color: var(--muted); gap: 10px;
  }
  .empty svg { opacity: .3; }
  .empty p { font-size: 13px; }

  /* Highlight match */
  .highlight { background: rgba(0,184,148,.3); border-radius: 2px; padding: 0 1px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="accent-bar"></div>
    <div>
      <div class="title">🔍 Busca de Atividades</div>
      <div class="subtitle">Dashboard 4D · Mina de Fábrica</div>
    </div>
  </div>
  <span class="badge-total" id="badge-total">0 atividades</span>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#00b894" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input
      id="searchInput"
      class="search-input"
      type="text"
      placeholder="Buscar por EDT, nome ou CWA…"
      autocomplete="off"
    />
    <button class="clear-btn" id="clearBtn">×</button>
  </div>

  <select class="filter-select" id="filterStatus">
    <option value="">Todos os Status</option>
    <option value="Concluído">✅ Concluído</option>
    <option value="Em Andamento">🔵 Em Andamento</option>
    <option value="Atrasado">🔴 Atrasado</option>
    <option value="Não Executado">⚪ Não Executado</option>
  </select>

  <select class="filter-select" id="filterCWA">
    <option value="">Todos os CWA</option>
  </select>

  <span class="result-count" id="resultCount"></span>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <div class="table-head">
    <span class="th-sort" data-col="edt">EDT ▾</span>
    <span>Nome da Tarefa</span>
    <span style="text-align:center">Status</span>
    <span style="text-align:center">Início Real</span>
    <span style="text-align:center">Término Real</span>
    <span>% Concluída</span>
  </div>
  <div class="virtual-outer" id="virtualOuter">
    <div class="virtual-inner" id="virtualInner"></div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail" id="detailPanel">
  <div class="detail-inner" id="detailContent"></div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  DATA — substitua este array pelos dados do seu cronograma
//  ou conecte via window.postMessage (ver instrução abaixo)
// ══════════════════════════════════════════════════════

// GERAÇÃO SINTÉTICA DE ~500 ATIVIDADES PARA DEMO DE PERFORMANCE
const CWAs = ['CWA 01','CWA 02','CWA 03','CWA 04','CWA 05','CWA 06','CWA 07','CWA 08'];
const disciplinas = [
  ['S- ESTRUTURA METÁLICA','ES- ESTRUTURA METÁLICA','Fornecimento de estrutura metálica','Montagem de estrutura metálica','Pintura anticorrosiva'],
  ['E- ELÉTRICA','SP - SPDA','Fornecimento de malha de aterramento','Fornecimento de caixas de inspeção','Instalação de cabos de AT'],
  ['I- INSTRUMENTAÇÃO','Fornecimento de instrumentos','Instalação de transmissores','Calibração de instrumentos'],
  ['C- CIVIL','Fundações','Escavação e aterro','Concretagem de base','Revestimento de piso'],
  ['P- TUBULAÇÃO','Fornecimento de tubos','Montagem de tubulação','Teste hidrostático','Isolamento térmico'],
  ['M- MECÂNICA','Fornecimento de equipamentos','Montagem mecânica','Alinhamento de eixos','Teste funcional'],
];
const statusList = ['Concluído','Concluído','Concluído','Em Andamento','Atrasado','Não Executado'];

function randDate(base, offset) {
  const d = new Date(2025, 8, 1);
  d.setDate(d.getDate() + base + Math.floor(Math.random()*offset));
  return d.toLocaleDateString('pt-BR');
}

const DATA = [];
let idxGlobal = 1;

CWAs.forEach((cwa, ci) => {
  disciplinas.forEach((disc, di) => {
    const parentEDT = `1.3.${ci+1}.${di+1}`;
    const parentStatus = statusList[Math.floor(Math.random()*statusList.length)];
    const parentConc = parentStatus === 'Concluído' ? 100 : parentStatus === 'Não Executado' ? 0 : Math.floor(Math.random()*80)+10;
    DATA.push({
      id: idxGlobal++,
      edt: parentEDT,
      nome: `${disc[0]} - ${cwa}`,
      inicioBase: randDate(0,30), terminoBase: randDate(30,60),
      inicio: randDate(0,20), termino: parentStatus === 'Concluído' ? randDate(30,40) : '',
      status: parentStatus, concluida: parentConc,
      desvio: (Math.random()*10-5).toFixed(1),
      prev: (Math.random()*100).toFixed(1),
      real: (Math.random()*100).toFixed(1),
      cwa, nivel: 1,
    });
    disc.slice(1).forEach((sub, si) => {
      const subStatus = statusList[Math.floor(Math.random()*statusList.length)];
      const subConc = subStatus === 'Concluído' ? 100 : subStatus === 'Não Executado' ? 0 : Math.floor(Math.random()*80)+10;
      DATA.push({
        id: idxGlobal++,
        edt: `${parentEDT}.${si+1}`,
        nome: `${sub} - ${cwa}`,
        inicioBase: randDate(0,30), terminoBase: randDate(30,60),
        inicio: randDate(0,20), termino: subStatus === 'Concluído' ? randDate(30,40) : '',
        status: subStatus, concluida: subConc,
        desvio: (Math.random()*10-5).toFixed(1),
        prev: (Math.random()*100).toFixed(1),
        real: (Math.random()*100).toFixed(1),
        cwa, nivel: si < 1 ? 2 : 3,
      });
    });
  });
});

// ══════════════════════════════════════════════════════
//  PARA INTEGRAR COM POWER BI (HTML Content Visual):
//  Adicione uma medida DAX que gere um JSON com suas atividades
//  e envie via postMessage:
//
//  window.addEventListener('message', e => {
//    if (e.data && e.data.type === 'pbi-data') {
//      loadData(e.data.rows);
//    }
//  });
// ══════════════════════════════════════════════════════

// Populate CWA filter
const cwas = [...new Set(DATA.map(d => d.cwa))].sort();
const selCWA = document.getElementById('filterCWA');
cwas.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; selCWA.appendChild(o); });

document.getElementById('badge-total').textContent = DATA.length + ' atividades';

// ── VIRTUAL SCROLL ENGINE ──
const ROW_H = 38;
const BUFFER = 8;

let filtered = [...DATA];
let sortCol = null, sortDir = 1;
let selectedId = null;

const outer = document.getElementById('virtualOuter');
const inner = document.getElementById('virtualInner');

function renderVisible() {
  const scrollTop = outer.scrollTop;
  const viewH = outer.clientHeight;
  const total = filtered.length;
  inner.style.height = (total * ROW_H) + 'px';

  const startIdx = Math.max(0, Math.floor(scrollTop / ROW_H) - BUFFER);
  const endIdx   = Math.min(total - 1, Math.ceil((scrollTop + viewH) / ROW_H) + BUFFER);

  // Remove nodes outside range
  const existing = {};
  for (const el of inner.children) existing[+el.dataset.idx] = el;
  for (const [idx, el] of Object.entries(existing)) {
    if (+idx < startIdx || +idx > endIdx) el.remove();
  }

  const q = document.getElementById('searchInput').value.toLowerCase();

  for (let i = startIdx; i <= endIdx; i++) {
    if (inner.querySelector(`[data-idx="${i}"]`)) continue;
    const row = filtered[i];
    const el = document.createElement('div');
    el.className = 'row' + (row.id === selectedId ? ' selected' : '');
    el.dataset.idx = i;
    el.style.top = (i * ROW_H) + 'px';

    // highlight match
    function hl(str) {
      if (!q) return str;
      const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      return str.replace(re, '<span class="highlight">$1</span>');
    }

    const sc = statusClass(row.status);
    const pct = row.concluida || 0;
    const fillColor = pct === 100 ? '#3fb950' : pct > 50 ? '#00b894' : '#e3b341';

    el.innerHTML = `
      <span class="cell-edt">${hl(row.edt)}</span>
      <span class="cell-name lvl-${row.nivel}">${hl(row.nome)}</span>
      <span style="text-align:center"><span class="badge ${sc.cls}"><span class="dot" style="background:${sc.dot}"></span>${row.status}</span></span>
      <span class="cell-date">${row.inicio || '—'}</span>
      <span class="cell-date">${row.termino || '—'}</span>
      <span class="cell-progress">
        <span class="progress-track"><span class="progress-fill" style="width:${pct}%;background:${fillColor}"></span></span>
        <span class="pct-label">${pct}%</span>
      </span>
    `;

    el.addEventListener('click', () => selectRow(row, el));
    inner.appendChild(el);
  }
}

function statusClass(s) {
  if (s === 'Concluído')    return { cls: 'badge-concluido', dot: '#3fb950' };
  if (s === 'Em Andamento') return { cls: 'badge-andamento', dot: '#58a6ff' };
  if (s === 'Atrasado')     return { cls: 'badge-atrasado',  dot: '#f85149' };
  return { cls: 'badge-executado', dot: '#484f58' };
}

function selectRow(row, el) {
  selectedId = row.id;
  document.querySelectorAll('.row.selected').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
  openDetail(row);
}

function openDetail(row) {
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');
  panel.classList.add('open');
  content.innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-edt">EDT ${row.edt} · ${row.cwa}</div>
        <div class="detail-name">${row.nome}</div>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕ Fechar</button>
    </div>
    <div class="detail-grid">
      ${kv('Início Base', row.inicioBase)}
      ${kv('Término Base', row.terminoBase)}
      ${kv('Início Real', row.inicio || '—')}
      ${kv('Término Real', row.termino || '—')}
      ${kv('Status', row.status)}
      ${kv('% Concluída', row.concluida + '%')}
      ${kv('% Desvio', row.desvio + '%')}
      ${kv('% Prev', row.prev + '%')}
      ${kv('% Real', row.real + '%')}
    </div>
  `;
}
function kv(k, v) {
  return `<div class="detail-kv"><div class="k">${k}</div><div class="v">${v}</div></div>`;
}
function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedId = null;
  document.querySelectorAll('.row.selected').forEach(r => r.classList.remove('selected'));
}

// ── FILTER + SEARCH ──
let debounceTimer;
function applyFilters() {
  const q     = document.getElementById('searchInput').value.toLowerCase().trim();
  const st    = document.getElementById('filterStatus').value;
  const cwaF  = document.getElementById('filterCWA').value;

  filtered = DATA.filter(r => {
    const matchQ  = !q  || r.nome.toLowerCase().includes(q) || r.edt.toLowerCase().includes(q) || r.cwa.toLowerCase().includes(q);
    const matchSt = !st || r.status === st;
    const matchCW = !cwaF || r.cwa === cwaF;
    return matchQ && matchSt && matchCW;
  });

  if (sortCol) {
    filtered.sort((a,b) => {
      const av = a[sortCol] || '', bv = b[sortCol] || '';
      return (av > bv ? 1 : av < bv ? -1 : 0) * sortDir;
    });
  }

  inner.innerHTML = '';
  outer.scrollTop = 0;
  document.getElementById('resultCount').textContent = `${filtered.length} de ${DATA.length} atividades`;
  renderVisible();
}

document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(applyFilters, 180);
});
document.getElementById('filterStatus').addEventListener('change', applyFilters);
document.getElementById('filterCWA').addEventListener('change', applyFilters);
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  applyFilters();
});
outer.addEventListener('scroll', renderVisible);
window.addEventListener('resize', renderVisible);

// Sort by column header
document.querySelectorAll('.th-sort').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('.th-sort').forEach(t => t.textContent = t.textContent.replace(/ [▴▾]/,''));
    th.textContent = th.textContent + (sortDir === 1 ? ' ▾' : ' ▴');
    applyFilters();
  });
});

// ── POWER BI postMessage integration ──
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'pbi-data' && Array.isArray(e.data.rows)) {
    DATA.length = 0;
    e.data.rows.forEach((r,i) => DATA.push({...r, id: i}));
    document.getElementById('badge-total').textContent = DATA.length + ' atividades';
    // Rebuild CWA filter
    const cwasNew = [...new Set(DATA.map(d => d.cwa || ''))].sort();
    selCWA.innerHTML = '<option value="">Todos os CWA</option>';
    cwasNew.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; selCWA.appendChild(o); });
    applyFilters();
  }
});

// init
applyFilters();
</script>
</body>
</html>
